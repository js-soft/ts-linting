name: Check Pull Request

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

jobs:
  validate-pr-label:
    name: Validate the Pull Request's labels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate labels
        run: ./.github/scripts/check-pr.sh
