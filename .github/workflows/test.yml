name: Test ESLint config

on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: current
      - run: npm ci
      - run: npm i eslint typescript
      - run: npm test
      - run: npx better-npm-audit audit
